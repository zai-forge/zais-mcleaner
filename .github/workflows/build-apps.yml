name: Build Apps (Android + Windows)

# Compila os binários nativos e anexa numa Release.
# Dispare criando uma tag, ex.: git tag v0.1.0 && git push --tags
# Ou rode manualmente em Actions (workflow_dispatch).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Build (MSI + NSIS)
        run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Instalar NDK
        run: sdkmanager "ndk;26.1.10909125"
      - run: npm ci
      - name: Inicializar projeto Android
        run: npm run tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
      - name: Build APK (universal, debug — instalável sem loja)
        run: npm run tauri android build -- --apk --debug
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
